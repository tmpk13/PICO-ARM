# tmc-new-era host config.
#
# One joystick can drive any number of SKR Picos. Each [[boards]] block
# declares one board's serial port plus its own axis / button bindings.
# Joystick axes and buttons are dispatched to every board that listed
# them, so you can split joystick controls between boards however you
# like (e.g. left stick on board A, right stick on board B).
#
# Each [[boards.axes]] block maps one joystick axis (index N on
# /dev/input/jsN) to one stepper axis on that board. At full deflection
# the firmware will be commanded `jog <target> <+- sensitivity>` (in
# steps/sec). Inside the deadzone the axis is treated as zero (and the
# firmware is told to stop).
#
# Each [[boards.buttons]] block sends a single one-shot `move` on press.

# Linux joystick device. Use `ls /dev/input/js*` to find yours.
device  = "/dev/input/js0"

# Integrator tick rate. The reference uses 40 Hz; valid range 10..200.
poll_hz = 40

# Print every command sent to the firmware. Handy when first wiring up.
log = true

# Send `enable all` to every board on startup, and `disable all` on Ctrl-C.
enable_on_start  = true
safe_stop_on_exit = true

# ---- board 0 ------------------------------------------------------------

[[boards]]
serial = "/dev/serial/by-id/usb-tmc-new-era_SKR_Pico_Stepper_CLI_5044340410315D1C-if00"

name   = "main"

# ---- axes (sticks) -------------------------------------------------------
# `target`      stepper axis: x | y | z | e | none
# `sensitivity` steps/sec at full deflection. Try 500-2000 to start.
# `deadzone`    0..0.95 fraction of stick travel treated as zero.
# `invert`      flips direction.
# `accel`       firmware-side ramp limit, steps/sec/sec. 0 = instant
#               (snappy but jerky). 1000-5000 is a sane starting band;
#               raise it for a more responsive feel, lower for smoother
#               motion. Time from rest to full sensitivity is
#               approximately sensitivity / accel seconds.
#
# ---- TMC2209 UART config (optional, v0.5.0+) -----------------------------
# `microsteps`      1/2/4/8/16/32/64/128/256. 0 (default) skips the UART
#                   command and the driver stays in standalone mode where
#                   MS1/MS2 pins pick the count -- which is *different per
#                   axis* on the SKR Pico (X=8, Z=32, Y=64, E=16), so the
#                   same `sensitivity` produces different physical speeds
#                   across axes. Setting microsteps here normalizes that.
#                   When you change microsteps, scale `sensitivity` to
#                   match: e.g. going from standalone Y=64 to UART 16 you
#                   should divide Y sensitivity by 4.
# `run_current_ma`  Run-mode RMS current. Common: 600-1000 mA for NEMA17.
#                   Higher = more torque, hotter coils.
# `hold_current_ma` Standstill current. Usually 40-60% of run.
# `hold_delay`      0..15. Power-down delay before dropping to hold
#                   current. ~2^18/fclk per unit -- 8 is a fine default.
# `spreadcycle`     false (default) = StealthChop (quiet, lower torque
#                   at high speed). true = SpreadCycle (noisier, full
#                   torque, better high-speed tracking).
# `interpolate`     true (default) = interpolate to 256 ustep internally
#                   for smoother motion at any configured count.

# x == Base Pivot
[[boards.axes]]
index           = 3
target          = "x"
sensitivity     = 5000
deadzone        = 0.20
invert          = false
accel           = 4000
microsteps      = 16
run_current_ma  = 800
hold_current_ma = 400
hold_delay      = 8
spreadcycle     = false
interpolate     = true

# y == Joint 2 (Middle)
[[boards.axes]]
index           = 1
target          = "y"
sensitivity     = 2000
deadzone        = 0.20
invert          = true
accel           = 3000
microsteps      = 16
run_current_ma  = 800
hold_current_ma = 400
hold_delay      = 8
spreadcycle     = false
interpolate     = true

# z == Joint 3 (End)
[[boards.axes]]
index           = 1
target          = "z"
sensitivity     = 2000
deadzone        = 0.20
invert          = true
accel           = 3000
microsteps      = 16
run_current_ma  = 800
hold_current_ma = 400
hold_delay      = 8
spreadcycle     = false
interpolate     = true

# e == Joint 1 (Bottom)
[[boards.axes]]
index           = 2
target          = "e"
sensitivity     = 2000
deadzone        = 0.10
invert          = false
accel           = 2000
microsteps      = 16
run_current_ma  = 600
hold_current_ma = 300
hold_delay      = 8
spreadcycle     = false
interpolate     = true

