# tmc-new-era host config.
#
# One joystick can drive any number of SKR Picos. Each [[boards]] block
# declares one board's serial port plus its own axis / button bindings.
# Joystick axes and buttons are dispatched to every board that listed
# them, so you can split joystick controls between boards however you
# like (e.g. left stick on board A, right stick on board B).
#
# Each [[boards.axes]] block maps one joystick axis (index N on
# /dev/input/jsN) to one stepper axis on that board. At full deflection
# the firmware will be commanded `jog <target> <+- sensitivity>` (in
# steps/sec). Inside the deadzone the axis is treated as zero (and the
# firmware is told to stop).
#
# Each [[boards.buttons]] block sends a single one-shot `move` on press.

# Linux joystick device. Use `ls /dev/input/js*` to find yours.
device  = "/dev/input/js0"

# Integrator tick rate. The reference uses 40 Hz; valid range 10..200.
poll_hz = 40

# Print every command sent to the firmware. Handy when first wiring up.
log = true

# Send `enable all` to every board on startup, and `disable all` on Ctrl-C.
enable_on_start  = true
safe_stop_on_exit = true

# ---- board 0 ------------------------------------------------------------

[[boards]]
serial = "/dev/ttyACM2"
name   = "main"

# ---- axes (sticks) -------------------------------------------------------
# `target`      stepper axis: x | y | z | e | none
# `sensitivity` steps/sec at full deflection. Try 500-2000 to start.
# `deadzone`    0..0.95 fraction of stick travel treated as zero.
# `invert`      flips direction.
# `accel`       firmware-side ramp limit, steps/sec/sec. 0 = instant
#               (snappy but jerky). 1000-5000 is a sane starting band;
#               raise it for a more responsive feel, lower for smoother
#               motion. Time from rest to full sensitivity is
#               approximately sensitivity / accel seconds.

[[boards.axes]]
index       = 3
target      = "x"
sensitivity = 3000
deadzone    = 0.10
invert      = false
accel       = 4000

[[boards.axes]]
index       = 1
target      = "y"
sensitivity = 2000
deadzone    = 0.10
invert      = false
accel       = 3000

[[boards.axes]]
index       = 1
target      = "z"
sensitivity = 2000
deadzone    = 0.15
invert      = false
accel       = 3000

[[boards.axes]]
index       = 1
target      = "e"
sensitivity = 800
deadzone    = 0.15
invert      = false
accel       = 2000

[[boards.fans]]
index  = 8
target = 0
mode   = "toggle"

# ---- buttons (one-shot nudges) ------------------------------------------
# `delta` is signed steps; `hz` is the step rate used during the nudge.

# [[boards.buttons]]
# index  = 0
# target = "e"
# delta  = 200
# hz     = 1000

# [[boards.buttons]]
# index  = 1
# target = "e"
# delta  = -200
# hz     = 1000

# ---- fans ---------------------------------------------------------------
# `index`  joystick button index
# `target` firmware fan number: 0 = GP17, 1 = GP18, 2 = GP20
# `mode`   "toggle"   - each press flips the fan on/off
#          "momentary" - on while the button is held, off on release

# [[boards.fans]]
# index  = 0
# target = 2
# mode   = "momentary"

# [[boards.fans]]
# index  = 5
# target = 1
# mode   = "toggle"

# [[boards.fans]]
# index  = 6
# target = 2
# mode   = "toggle"

# ---- servos -------------------------------------------------------------
# Repurposes the four endstop headers + the dedicated SERVOS pin as 50 Hz
# PWM outputs. `target` selects which header:
#   0 = X-STOP  (GP4)
#   1 = Y-STOP  (GP3)
#   2 = Z-STOP  (GP25)
#   3 = E0-STOP (GP16)
#   4 = SERVOS  (GP29)
#
# Stick-driven servos. `min_us`/`max_us` bracket the swing; `center_us`
# is what is sent inside the deadzone (set 0 to go limp at rest).
# Typical hobby servos want 500..2500 us with 1500 us center.



# Button-driven servos.
# mode = "momentary" (press_us while held) or "toggle" (flip on press).
# Set release_us = 0 to drop PWM (servo limp) on release / toggle-off.

# [[boards.servo_buttons]]
# index      = 3
# target     = 0         # X-STOP header (GP4)
# press_us   = 1800
# release_us = 1200
# mode       = "momentary"

# ---- board 1 (example: a second SKR Pico driven by the right stick) -----
# Uncomment and adjust the serial path to enable.
#
[[boards]]
serial = "/dev/ttyACM1"
name   = "aux"

# End effector
[[boards.axes]]
index       = 0
target      = "x"
sensitivity = 500
deadzone    = 0.10
invert      = false
accel       = 1500

# End effector pivot
[[boards.axes]]
index       = 4
target      = "z"
sensitivity = 500
deadzone    = 0.10
invert      = false
accel       = 1500

# End effector wrist
[[boards.axes]]
index       = 5
target      = "e"
sensitivity = 500
deadzone    = 0.10
invert      = false
accel       = 1500

[[boards.fans]]
index  = 0
target = 2
mode   = "momentary"

[[boards.servo_axes]]
index     = 2          # joystick axis
target    = 4          # SERVOS header (GP29)
min_us    = 1000
max_us    = 2000
center_us = 1500
deadzone  = 0.00
invert    = false