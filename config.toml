[[boards.fans]]
index  = 8
target = 0
mode   = "toggle"

# ---- buttons (one-shot nudges) ------------------------------------------
# `delta` is signed steps; `hz` is the step rate used during the nudge.

# [[boards.buttons]]
# index  = 0
# target = "e"
# delta  = 200
# hz     = 1000

# [[boards.buttons]]
# index  = 1
# target = "e"
# delta  = -200
# hz     = 1000

# ---- fans ---------------------------------------------------------------
# `index`  joystick button index
# `target` firmware fan number: 0 = GP17, 1 = GP18, 2 = GP20
# `mode`   "toggle"   - each press flips the fan on/off
#          "momentary" - on while the button is held, off on release

# [[boards.fans]]
# index  = 0
# target = 2
# mode   = "momentary"

# [[boards.fans]]
# index  = 5
# target = 1
# mode   = "toggle"

# [[boards.fans]]
# index  = 6
# target = 2
# mode   = "toggle"

# ---- servos -------------------------------------------------------------
# Repurposes the four endstop headers + the dedicated SERVOS pin as 50 Hz
# PWM outputs. `target` selects which header:
#   0 = X-STOP  (GP4)
#   1 = Y-STOP  (GP3)
#   2 = Z-STOP  (GP25)
#   3 = E0-STOP (GP16)
#   4 = SERVOS  (GP29)
#
# Stick-driven servos. `min_us`/`max_us` bracket the swing; `center_us`
# is what is sent inside the deadzone (set 0 to go limp at rest).
# Typical hobby servos want 500..2500 us with 1500 us center.



# Button-driven servos.
# mode = "momentary" (press_us while held) or "toggle" (flip on press).
# Set release_us = 0 to drop PWM (servo limp) on release / toggle-off.

# [[boards.servo_buttons]]
# index      = 3
# target     = 0         # X-STOP header (GP4)
# press_us   = 1800
# release_us = 1200
# mode       = "momentary"

# ---- board 1 (example: a second SKR Pico driven by the right stick) -----
# Uncomment and adjust the serial path to enable.
#
[[boards]]
serial = "/dev/serial/by-id/usb-tmc-new-era_SKR_Pico_Stepper_CLI_5044340408D1B41C-if00"
name   = "aux"

# End effector
[[boards.axes]]
index       = 0
target      = "x"
sensitivity = 500
deadzone    = 0.10
invert      = false
accel       = 1500

# End effector pivot
[[boards.axes]]
index       = 4
target      = "z"
sensitivity = 500
deadzone    = 0.10
invert      = false
accel       = 1500

# End effector wrist
[[boards.axes]]
index       = 5
target      = "e"
sensitivity = 200
deadzone    = 0.10
invert      = false
accel       = 200
run_current_ma  = 100
hold_current_ma = 10

[[boards.fans]]
index  = 0
target = 2
mode   = "momentary"

